apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: healthcare
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      initContainers:
        - name: wait-for-services
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z patient-service 8081 && nc -z appointment-service 8082; do echo waiting for services; sleep 3; done']
      containers:
        - name: api-gateway
          image: api-gateway:1.0
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_CLOUD_GATEWAY_MVC_ROUTES_0_ID
              value: patient-service
            - name: SPRING_CLOUD_GATEWAY_MVC_ROUTES_0_URI
              value: http://patient-service:8081
            - name: SPRING_CLOUD_GATEWAY_MVC_ROUTES_0_PREDICATES_0
              value: Path=/api/patients/**
            - name: SPRING_CLOUD_GATEWAY_MVC_ROUTES_1_ID
              value: appointment-service
            - name: SPRING_CLOUD_GATEWAY_MVC_ROUTES_1_URI
              value: http://appointment-service:8082
            - name: SPRING_CLOUD_GATEWAY_MVC_ROUTES_1_PREDICATES_0
              value: Path=/api/appointments/**
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: healthcare
spec:
  type: NodePort
  selector:
    app: api-gateway
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
